<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Add Employee</title>

    <style>

        body{
        margin:0;
        font-family:Arial, sans-serif;
        background:#f3f4f6;
        }

        /* Sidebar */

        .sidebar{
        width:220px;
        height:100vh;
        background:#1f2a3a;
        position:fixed;
        color:white;
        }

        .sidebar h2{
        text-align:center;
        padding:20px 0;
        border-bottom:1px solid #2f3b4f;
        }

        .sidebar ul{
        list-style:none;
        padding:0;
        }

        .sidebar ul li{
        padding:15px 25px;
        }

        .sidebar ul li a{
        text-decoration:none;
        color:white;
        font-size:16px;
        }

        .sidebar ul li:hover{
        background:#2c3a50;
        }

        .logout{
        color:#ff6b6b !important;
        }

        /* Main */

        .main{
        margin-left:220px;
        padding:40px;
        }

        /* Form Card */

        .form-card{
        background:white;
        padding:35px;
        border-radius:12px;
        width:450px;
        box-shadow:0 8px 18px rgba(0,0,0,0.08);
        }

        .form-card h2{
        margin-bottom:20px;
        }

        /* Inputs */

        input, select{
        width:100%;
        padding:10px;
        margin-bottom:15px;
        border:1px solid #ddd;
        border-radius:6px;
        font-size:14px;
        }

        /* Button */

        button{
        width:100%;
        padding:12px;
        background:#1f2a3a;
        color:white;
        border:none;
        border-radius:6px;
        font-size:16px;
        cursor:pointer;
        }

        button:hover{
        background:#2c3a50;
        }

    </style>

</head>

<body>

<div class="sidebar">

    <h2>Admin</h2>

    <ul>
        <li><a href="/admin/dashboard">Dashboard</a></li>
        <li><a href="/admin/employees">Employees</a></li>
        <li><a href="/admin/add-employee">Add Employee</a></li>
        <li><a href="/logout" class="logout">Logout</a></li>
    </ul>

</div>

<div class="main">

    <div class="form-card">

        <h2>Add Employee</h2>

        <form action="/admin/save-employee" method="post"  autocomplete="off">

            <input type="text" name="empId" placeholder="Employee ID" required>

            <input type="text" name="password" placeholder="Password" required>

            <select name="role">
                <option value="">Select Role</option>
                <option>EMPLOYEE</option>
                <option>MANAGER</option>
                <option>CEO</option>
                <option>ADMIN</option>
            </select>

            <input type="text" name="email" placeholder="Email">

            <input type="text" name="department" placeholder="Department">

            <input type="text" name="country" placeholder="Country">

            <input type="text" name="branch" placeholder="Branch">

            <input type="text" name="phone" placeholder="Phone">

            <input type="number" name="salary" placeholder="Salary">

            <button type="submit">Add Employee</button>

        </form>

    </div>

</div>

</body>
</html>
