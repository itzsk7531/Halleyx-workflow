<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>ExpenseFlow Login</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: "Segoe UI", sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:#eef2f7;
        }

        .login-container{
            background:white;
            width:360px;
            padding:40px;
            border-radius:10px;
            box-shadow:0 6px 18px rgba(0,0,0,0.1);
        }

        .logo{
            text-align:center;
            margin-bottom:25px;
        }

        .logo img{
            width:160px;
        }

        label{
            font-size:14px;
            color:#555;
        }

        input{
            width:100%;
            padding:11px;
            margin-top:6px;
            margin-bottom:16px;
            border:1px solid #dcdcdc;
            border-radius:6px;
            font-size:14px;
        }

        button{
            width:100%;
            padding:11px;
            background:#2c7be5;
            border:none;
            color:white;
            font-size:15px;
            border-radius:6px;
            cursor:pointer;
        }

        button:hover{
            background:#1f65c9;
        }

        .forgot{
            text-align:right;
            margin-bottom:18px;
        }

        .forgot a{
            text-decoration:none;
            font-size:13px;
            color:#2c7be5;
        }

        .footer{
            margin-top:20px;
            text-align:center;
            font-size:12px;
            color:#888;
        }
    </style>
</head>
<body>
<div class="login-container">
    <div class="logo">
        <img th:src="@{/images/logos.png}" alt="ExpenseFlow Logo">
    </div>
    <form th:action="@{/login}" method="post"  autocomplete="off">
        <label>Employee ID</label>
        <input type="text" name="empId" placeholder="Employee ID" required>
        <label>Password</label>
        <input type="password" name="password" placeholder="Enter Password" required>
        <div class="forgot">
            <a th:href="@{/forgot-password}">Forgot Password?</a>
        </div>
        <button type="submit">Login</button>
    </form>
    <div class="footer">
        ExpenseFlow © 2026
    </div>
</div>
</body>
</html>
