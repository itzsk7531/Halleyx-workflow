<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Manager Approvals</title>

    <style>

        body{
            font-family: Arial;
            background:#f4f6f9;
            margin:0;
        }

        h2{
            text-align:center;
            margin-top:20px;
        }

        table{
            width:95%;
            margin:30px auto;
            border-collapse:collapse;
            background:white;
        }

        th{
            background:#2c3e50;
            color:white;
            padding:10px;
        }

        td{
            padding:10px;
            text-align:center;
            border-bottom:1px solid #ddd;
        }

        tr:hover{
            background:#f2f2f2;
        }

        button{
            padding:6px 12px;
            border:none;
            border-radius:4px;
            cursor:pointer;
        }

        .approve{
            background:#27ae60;
            color:white;
        }

        .reject{
            background:#e74c3c;
            color:white;
        }

        button:hover{
            opacity:0.8;
        }

    </style>

</head>

<body>

<h2>Manager Expense Approvals</h2>

<table>

    <tr>
        <th>Emp ID</th>
        <th>Department</th>
        <th>Branch</th>
        <th>Title</th>
        <th>Amount</th>
        <th>Reason</th>
<!--        <th>File</th>-->
<!--        <th>Date</th>-->
        <th>Action</th>
    </tr>

    <tr th:each="e : ${expenses}">

        <td th:text="${e.empId}"></td>
        <td th:text="${e.department}"></td>
        <td th:text="${e.branch}"></td>
        <td th:text="${e.title}"></td>
        <td th:text="${e.amount}"></td>
        <td th:text="${e.reason}"></td>

<!--        <td>-->
<!--            <img th:src="@{/images/{file}(file=${exp.billFile})}" width="80" height="80">-->
<!--        </td>-->

<!--        <td th:text="${e.date}"></td>-->

        <td>

            <form th:action="@{/manager/approve/{id}(id=${e.id})}" method="post" style="display:inline">
                <button class="approve">Approve</button>
            </form>

            <form th:action="@{/manager/reject/{id}(id=${e.id})}" method="post" style="display:inline">
                <button class="reject">Reject</button>
            </form>

        </td>

    </tr>

</table>

</body>
</html>
