<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Create Expense</title>

    <style>

        *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:"Segoe UI", Arial, sans-serif;
        }

        body{
        background:#f4f6fb;
        }


        /* NAVBAR */

        .navbar{
        display:flex;
        justify-content:space-between;
        align-items:center;
        padding:14px 60px;
        background:white;
        box-shadow:0 2px 8px rgba(0,0,0,0.06);
        }

        .logo img{
        height:38px;
        }

        /* NAV LINKS */

        .nav-links{
        list-style:none;
        display:flex;
        gap:35px;
        align-items:center;
        }

        .nav-links li a{
        text-decoration:none;
        color:#555;
        font-size:15px;
        font-weight:500;
        position:relative;
        padding-bottom:4px;
        }

        .nav-links li a::after{
        content:"";
        position:absolute;
        left:0;
        bottom:0;
        width:0%;
        height:2px;
        background:#333;
        transition:0.25s;
        }

        .nav-links li a:hover::after{
        width:100%;
        }

        /* LOGOUT */

        .nav-links li a.logout{
        color:#e74c3c;
        font-weight:600;
        }

        .nav-links li a.logout::after{
        background:#e74c3c;
        }


        /* PAGE CONTAINER */

        .container{
        display:flex;
        justify-content:center;
        margin-top:60px;
        }


        /* FORM CARD */

        .form-card{
        background:white;
        padding:35px 40px;
        width:440px;
        border-radius:10px;
        box-shadow:0 8px 25px rgba(0,0,0,0.05);
        }

        .form-card h2{
        margin-bottom:25px;
        font-size:22px;
        color:#333;
        text-align:center;
        }


        /* GRID FORM */

        .form-grid{
        display:grid;
        grid-template-columns:1fr 1fr;
        gap:14px;
        }

        .form-group{
        display:flex;
        flex-direction:column;
        }

        .form-group label{
        font-size:13px;
        margin-bottom:4px;
        color:#555;
        }

        .form-group input,
        .form-group select,
        .form-group textarea{
        padding:8px;
        border:1px solid #ddd;
        border-radius:6px;
        font-size:13px;
        }

        .form-group textarea{
        grid-column:span 2;
        resize:none;
        }

        .full{
        grid-column:span 2;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus{
        outline:none;
        border-color:#4c6ef5;
        }


        /* BUTTON */

        .submit-btn{
        margin-top:18px;
        width:100%;
        padding:10px;
        background:#4c6ef5;
        color:white;
        border:none;
        border-radius:6px;
        font-size:14px;
        font-weight:600;
        cursor:pointer;
        }

        .submit-btn:hover{
        background:#3b5bdb;
        }

    </style>

</head>


<body>

<nav class="navbar">

    <div class="logo">
        <img th:src="@{/images/logos.png}" alt="logo">
    </div>

    <ul class="nav-links">
        <li><a href="/employee/employee-dashboard">Home</a></li>
        <li><a href="/employee/create-expense">Create Expense</a></li>
        <li><a href="/employee/status">Status</a></li>
        <li><a href="/employee/history">Expense History</a></li>
        <li><a class="logout" href="/logout">Logout</a></li>
    </ul>

</nav>


<div class="container">

    <div class="form-card">

        <h2>Create Expense</h2>

        <form action="/employee/save-expense" method="post" enctype="multipart/form-data">

            <div class="form-grid">
                <div class="form-group full">
                    <label>Expense Title</label>
                    <input type="text" name="title" required>
                </div>

                <div class="form-group">
                    <label>Employee ID</label>
                    <input type="text" name="empId" required>
                </div>

                <div class="form-group">
                    <label>Phone</label>
                    <input type="text" name="phone" required>
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" required>
                </div>

                <div class="form-group">
                    <label>Amount</label>
                    <input type="number" name="amount" required>
                </div>

                <div class="form-group">
                    <label>Date Spent</label>
                    <input type="date" name="dateSpent" required>
                </div>

                <div class="form-group">
                    <label>Priority</label>
                    <select name="priority">
                        <option>High</option>
                        <option>Medium</option>
                        <option>Low</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Country</label>
                    <input type="text" name="country">
                </div>

                <div class="form-group">
                    <label>Department</label>
                    <input type="text" name="department">
                </div>

                <div class="form-group">
                    <label>Branch</label>
                    <input type="text" name="branch">
                </div>

                <div class="form-group full">
                    <label>Reason</label>
                    <textarea name="reason" rows="3"></textarea>
                </div>

                <div class="form-group full">
                    <label>Upload Invoice</label>
                    <input type="file" name="file">
                </div>

            </div>

            <button class="submit-btn">Submit Expense</button>

        </form>

    </div>

</div>

</body>
</html>
