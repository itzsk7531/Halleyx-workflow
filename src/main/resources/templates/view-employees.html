<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

    <title>Employees</title>

    <style>

        body{
        margin:0;
        font-family:Arial;
        background:#f4f6f9;
        }

        /* Sidebar */

        .sidebar{
        width:220px;
        height:100vh;
        background:#1f2937;
        position:fixed;
        color:white;
        }

        .sidebar h2{
        text-align:center;
        padding:20px;
        }

        .sidebar a{
        display:block;
        padding:15px;
        color:white;
        text-decoration:none;
        }

        .sidebar a:hover{
        background:#374151;
        }

        .logout{
        color:red;
        font-weight:bold;
        }

        .logout:hover{
        background:red;
        }

        /* Main */

        .main{
        margin-left:220px;
        padding:30px;
        }



        table{
        width:100%;
        border-collapse:collapse;
        background:white;
        box-shadow:0 2px 5px rgba(0,0,0,0.1);
        }

        th,td{
        padding:12px;
        border-bottom:1px solid #ddd;
        text-align:left;
        }

        th{
        background:#f2f2f2;
        }

        tr:hover{
        background:#f9f9f9;
        }

    </style>

</head>

<body>



<div class="main">

    <h1>Employee List</h1>

    <table>

        <tr>
            <th>ID</th>
            <th>Email</th>
            <th>Department</th>
            <th>Country</th>
            <th>Branch</th>
            <th>Salary</th>
        </tr>

        <tr th:each="emp : ${employees}">

            <td th:text="${emp.empId}"></td>

            <td th:text="${emp.email}"></td>
            <td th:text="${emp.department}"></td>
            <td th:text="${emp.country}"></td>
            <td th:text="${emp.branch}"></td>
            <td th:text="${emp.salary}"></td>

        </tr>

    </table>

</div>

</body>
</html>
